  # ── API Gateway (single public entry point) ───────────────────────────────────

  api-gateway:
    build: ./api-gateway
    ports:
      - "9090:9090"
    restart: on-failure
    environment:
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m"
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
