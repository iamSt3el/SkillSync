      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      RAZORPAY_KEY_ID: rzp_test_SWGUsISMJTk4IH
      RAZORPAY_KEY_SECRET: I8krFpGNIU2r4iuT2j3xxtrn
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      zipkin:
        condition: service_started
    networks:
