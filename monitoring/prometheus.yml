global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:9090']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8082']

  - job_name: 'mentor-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['mentor-service:8083']

  - job_name: 'skill-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['skill-service:8084']

  - job_name: 'session-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['session-service:8085']

  - job_name: 'group-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['group-service:8086']

  - job_name: 'review-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['review-service:8087']

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8088']
