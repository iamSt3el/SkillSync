spring:
  application:
    name: session-service

  # Database Configuration
  datasource:
    # Added 'createDatabaseIfNotExist=true' to solve the "Unknown database" error
    url: jdbc:mysql://${DB_HOST:localhost}:3306/skillsync_session?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        # Hibernate 6+ detects the dialect automatically; simplified for compatibility
        format_sql: true
    open-in-view: false

  # Event-Driven Communication (Messaging)
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# Server Port
server:
  port: 8085

# Service Discovery (Eureka)
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
    # Unique instance ID for scaling in SkillSync
    instance-id: ${spring.application.name}:${random.value}

# Monitoring & Resilience
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, resilience4j
  endpoint:
    health:
      show-details: always

# Resilience4j: Fault Tolerance for Mentor-Service calls
resilience4j:
  circuitbreaker:
    instances:
      mentor-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  timelimiter:
    instances:
      mentor-service:
        timeoutDuration: 3s

# Logging Configuration (Console + File Storage)
logging:
  level:
    root: INFO
    com.skillsync.sessionservice: DEBUG
    org.springframework.amqp: INFO
    org.hibernate.SQL: DEBUG
  
  file:
    # Creates a physical log file in the project root
    name: logs/session-service.log
  
  logback:
    rollingpolicy:
      # Keeps logs for 7 days and limits total size to 100MB
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
  
  pattern:
    # Professional log format for the file
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    # Clean, color-coded format for the console
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level) %clr(%logger{36}){cyan} %m%n"