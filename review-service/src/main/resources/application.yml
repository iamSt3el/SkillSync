spring:
  application:
    name: review-service

  datasource:
    url: jdbc:mysql://localhost:3306/skillsync_review
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

server:
  port: 8086

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info

# Resilience4j circuit breaker for Feign call to session-service
resilience4j:
  circuitbreaker:
    instances:
      session-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  timelimiter:
    instances:
      session-service:
        timeoutDuration: 3s

logging:
  level:
    com.skillsync.reviewservice: DEBUG
